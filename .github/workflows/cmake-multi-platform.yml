name: Build MetaHuman DNA Calibration (Windows + Python 3.13)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Setup MSVC Compiler Env
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SWIG
      shell: pwsh
      run: |
        choco install swig -y --no-progress
        swig -version

    - name: Add SWIG to PATH
      shell: pwsh
      run: |
        $env:Path = "C:\ProgramData\chocolatey\bin;$env:Path"
        swig -version

    - name: Configure CMake
      shell: pwsh
      run: |
        $pythonDir = Split-Path (Get-Command python).Source

        cmake -S dnacalib -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CXX_STANDARD=17 `
          -DCMAKE_CXX_STANDARD_REQUIRED=ON `
          -DCMAKE_CXX_EXTENSIONS=OFF `
          -DCMAKE_CXX_FLAGS="/EHsc /W0 /std:c++17" `
          -DCMAKE_C_FLAGS="/EHsc /W0" `
          -DPython_EXECUTABLE="$pythonDir\python.exe" `
          -DPython_ROOT_DIR="$pythonDir"

    - name: Build
      shell: pwsh
      run: |
        cmake --build build --config Release --parallel 4

    - name: Collect output files (_pyd + dll + dnacalib.py)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "output"

        # .pyd 파일 복사
        Get-ChildItem build -Recurse -Include *.pyd | Copy-Item -Destination "output/" -Force

        # dnacalib 관련 .dll 파일 복사
        Get-ChildItem build -Recurse -Include dnacalib*.dll | Copy-Item -Destination "output/" -Force

        # dnacalib.py 복사 (빌드 결과물 또는 소스에서)
        if (Test-Path "build/dnacalib.py") {
            Copy-Item "build/dnacalib.py" -Destination "output/" -Force
        } elseif (Test-Path "dnacalib/dnacalib.py") {
            Copy-Item "dnacalib/dnacalib.py" -Destination "output/" -Force
        }

        Write-Host "=== output 폴더에 들어간 파일 ==="
        Get-ChildItem output | Select-Object Name, Length

    - name: Upload output files
      uses: actions/upload-artifact@v4
      with:
        name: dnacalib-python3.13-windows
        path: output
        retention-days: 14
