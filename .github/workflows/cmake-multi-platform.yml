name: Build MetaHuman DNA Calibration (Windows + Python 3.13)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Setup MSVC Compiler Env
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SWIG
      shell: pwsh
      run: |
        choco install swig -y --no-progress
        swig -version

    - name: Add SWIG to PATH
      shell: pwsh
      run: |
        $env:Path = "C:\ProgramData\chocolatey\bin;$env:Path"
        swig -version

    - name: Configure CMake
      shell: pwsh
      run: |
        $pythonDir = Split-Path (Get-Command python).Source

        cmake -S dnacalib -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CXX_STANDARD=17 `
          -DCMAKE_CXX_STANDARD_REQUIRED=ON `
          -DCMAKE_CXX_EXTENSIONS=OFF `
          -DCMAKE_CXX_FLAGS="/EHsc /W0 /std:c++17" `
          -DCMAKE_C_FLAGS="/EHsc /W0" `
          -DPython_EXECUTABLE="$pythonDir\python.exe" `
          -DPython_ROOT_DIR="$pythonDir"

    - name: Build
      shell: pwsh
      run: |
        cmake --build build --config Release --parallel 4

    - name: Show generated files
      shell: pwsh
      run: |
        Write-Host "=== .pyd files ==="
        Get-ChildItem build -Recurse -Include *.pyd | Select-Object FullName, Length

        Write-Host "`n=== .dll files ==="
        Get-ChildItem build -Recurse -Include *.dll | Select-Object FullName, Length

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dnacalib-windows-python3.13
        path: build
        retention-days: 7
