name: Build MetaHuman DNA Calibration (Blender 5.1 Addon - Windows Only)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Blender 5.1 Addon on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Setup MSVC Compiler Env
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SWIG
      shell: pwsh
      run: |
        choco install swig -y --no-progress

    - name: Patch DynArray.h
      shell: pwsh
      run: |
        $file = "dnacalib/DNACalib/src/terse/types/DynArray.h"
        if (Test-Path $file) {
            $content = Get-Content $file -Raw
            $content = $content -replace 'std::copy\(start, end, stdext::checked_array_iterator<value_type\*>\(data\(\), size\(\)\)\);', 'std::copy(start, end, data());'
            Set-Content -Path $file -Value $content -Encoding utf8
        }

    - name: Configure CMake
      shell: pwsh
      run: |
        $pythonDir = Split-Path (Get-Command python).Source
        # 원래의 안정적인 동적 공유 라이브러리 빌드(ON)로 복구합니다.
        # Python 3.13 환경에서 구형 스레드 매크로 충돌을 방지하는 전역 플래그를 심습니다.
        cmake -S dnacalib -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_SHARED_LIBS=ON `
          -DCMAKE_CXX_STANDARD=17 `
          -DCMAKE_CXX_STANDARD_REQUIRED=ON `
          -DCMAKE_CXX_FLAGS="/EHsc /W0 /std:c++17 /MD /D_SWIG_NO_THREAD_FOR_PYTHON" `
          -DPython_EXECUTABLE="$pythonDir\python.exe"

    - name: Build
      shell: pwsh
      run: |
        cmake --build build --config Release --parallel 4

    - name: Prepare Blender Addon Package
      shell: powershell
      run: |
        # 1. 패키지 기본 구조 초기화
        New-Item -ItemType Directory -Force -Path "metahuman_dna"
        New-Item -ItemType Directory -Force -Path "metahuman_dna/lib"
        
        # 2. [핵심] 꼬여있던 복사 경로를 전면 전수조사 방식으로 수정
        # Release 빌드 폴더 내부에 파편화된 모든 .pyd 파일과 중요 .dll 파일들을 완벽하게 수집합니다.
        Get-ChildItem "build/Release" -Recurse -Include *.pyd, *.dll -ErrorAction SilentlyContinue | Copy-Item -Destination "metahuman_dna/lib/" -Force
        
        # 3. 파이썬 소스 래퍼 파일 복사
        Get-ChildItem -Path . -Recurse -Include dnacalib.py, py3dna.py -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notlike "*\metahuman_dna\*" } |
            Copy-Item -Destination "metahuman_dna/lib/" -Force

        # 4. 블렌더 5.1 규격 매니페스트 생성
        $manifest_content = @"
        schema_version = "1.0.0"
        id = "metahuman_dna"
        version = "1.0.0"
        name = "MetaHuman DNA Calibration Tools"
        tagline = "MetaHuman DNA Calibration tools inside Blender 5.1"
        maintainer = "Epic Games / Custom Build"
        type = "add-on"
        website = "https://github.com"

        [blender_version]
        min = "5.1.0"

        [platforms]
        windows-x64 = "*"
        "@
        
        Set-Content -Path "metahuman_dna/blender_manifest.toml" -Value $manifest_content -Encoding utf8

        # 5. 블렌더 5.1 런타임 진입 시 lib 폴더 안의 dnacalib.dll을 자동 인식하게 만드는 __init__.py
        $init_content = @"
        import sys
        import os

        def register():
            current_dir = os.path.dirname(__file__)
            lib_path = os.path.join(current_dir, "lib")
            
            # 이 구문이 있어야 파이썬이 같은 폴더에 있는 dnacalib.dll을 찾아 로드합니다.
            if hasattr(os, "add_dll_directory"):
                try:
                    os.add_dll_directory(lib_path)
                except Exception as e:
                    print(f"[MetaHuman DNA] DLL directory add failed: {e}")
                    
            paths_to_add = [current_dir, lib_path]
            for p in paths_to_add:
                if p not in sys.path:
                    sys.path.insert(0, p)
            print("[-] MetaHuman DNA Calibration Toolkit successfully system-linked.")

        def unregister():
            pass
        "@
        
        Set-Content -Path "metahuman_dna/__init__.py" -Value $init_content -Encoding utf8

    - name: Zip Addon Package (Strict Flat Root Structure)
      shell: powershell
      run: |
        Compress-Archive -Path "metahuman_dna" -DestinationPath "metahuman_dna_blender5.1_windows.zip" -Force

    - name: Upload Addon Archive
      uses: actions/upload-artifact@v4
      with:
        name: MetaHuman-DNA-Blender5.1-Addon
        path: metahuman_dna_blender5.1_windows.zip
