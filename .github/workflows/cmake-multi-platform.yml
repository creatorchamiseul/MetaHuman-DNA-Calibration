name: Build MetaHuman DNA Calibration (Windows + Python 3.13)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Setup MSVC Compiler Env
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SWIG
      shell: pwsh
      run: |
        choco install swig -y --no-progress
        swig -version

    - name: Add SWIG to PATH
      shell: pwsh
      run: |
        $env:Path = "C:\ProgramData\chocolatey\bin;$env:Path"
        swig -version

    - name: Patch DynArray.h (Fix C3878 error)
      shell: pwsh
      run: |
        $file = "dnacalib/DNACalib/src/terse/types/DynArray.h"
        
        if (Test-Path $file) {
            $content = Get-Content $file -Raw
            
            # stdext::checked_array_iterator 부분을 일반 copy로 교체
            $oldBlock = @"
            #if defined(_MSC_VER) && !defined(__clang__)
                if (size() != 0ul) {
                    std::copy(start, end, stdext::checked_array_iterator<value_type*>(data(), size()));
                }
            #else
                std::copy(start, end, data());
            #endif
"@
            
            $newBlock = @"
            #if defined(_MSC_VER) && !defined(__clang__)
                if (size() != 0ul) {
                    std::copy(start, end, data());
                }
            #else
                std::copy(start, end, data());
            #endif
"@
            
            $content = $content.Replace($oldBlock, $newBlock)
            Set-Content -Path $file -Value $content -Encoding utf8
            Write-Host "DynArray.h patched successfully (removed checked_array_iterator)"
        } else {
            Write-Host "DynArray.h not found"
        }

    - name: Configure CMake
      shell: pwsh
      run: |
        $pythonDir = Split-Path (Get-Command python).Source

        cmake -S dnacalib -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CXX_STANDARD=17 `
          -DCMAKE_CXX_STANDARD_REQUIRED=ON `
          -DCMAKE_CXX_EXTENSIONS=OFF `
          -DCMAKE_CXX_FLAGS="/EHsc /W0 /std:c++17" `
          -DCMAKE_C_FLAGS="/EHsc /W0" `
          -DPython_EXECUTABLE="$pythonDir\python.exe" `
          -DPython_ROOT_DIR="$pythonDir"

    - name: Build
      shell: pwsh
      run: |
        cmake --build build --config Release --parallel 4

    - name: Collect output files
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "output"

        Get-ChildItem build -Recurse -Include *.pyd | Copy-Item -Destination "output/" -Force
        Get-ChildItem build -Recurse -Include dnacalib*.dll | Copy-Item -Destination "output/" -Force

        if (Test-Path "build/dnacalib.py") {
            Copy-Item "build/dnacalib.py" -Destination "output/" -Force
        } elseif (Test-Path "dnacalib/dnacalib.py") {
            Copy-Item "dnacalib/dnacalib.py" -Destination "output/" -Force
        }

        Write-Host "=== output 폴더 파일 목록 ==="
        Get-ChildItem output | Select-Object Name, Length

    - name: Upload output files
      uses: actions/upload-artifact@v4
      with:
        name: dnacalib-python3.13-windows
        path: output
        retention-days: 14
