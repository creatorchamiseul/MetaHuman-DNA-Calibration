name: Build MetaHuman DNA Calibration (Windows + Python 3.13)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Setup MSVC Compiler Env
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SWIG
      shell: pwsh
      run: |
        choco install swig -y --no-progress

    - name: Patch DynArray.h
      shell: pwsh
      run: |
        $file = "dnacalib/DNACalib/src/terse/types/DynArray.h"
        if (Test-Path $file) {
            $content = Get-Content $file -Raw
            $content = $content -replace 'std::copy\(start, end, stdext::checked_array_iterator<value_type\*>\(data\(\), size\(\)\)\);', 'std::copy(start, end, data());'
            Set-Content -Path $file -Value $content -Encoding utf8
        }

    - name: Configure CMake
      shell: pwsh
      run: |
        $pythonDir = Split-Path (Get-Command python).Source
        cmake -S dnacalib -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CXX_STANDARD=17 `
          -DCMAKE_CXX_STANDARD_REQUIRED=ON `
          -DCMAKE_CXX_FLAGS="/EHsc /W0 /std:c++17" `
          -DPython_EXECUTABLE="$pythonDir\python.exe"

    - name: Build
      shell: pwsh
      run: |
        cmake --build build --config Release --parallel 4

    - name: Collect output files
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "output"

        Get-ChildItem build -Recurse -Include *.pyd | Copy-Item -Destination "output/" -Force
        Get-ChildItem build -Recurse -Include *dna*.dll, *dnacalib*.dll | Copy-Item -Destination "output/" -Force

        Get-ChildItem -Path . -Recurse -Include dnacalib.py, py3dna.py -ErrorAction SilentlyContinue |
            Copy-Item -Destination "output/" -Force

        Get-ChildItem output

    - name: Upload output files
      uses: actions/upload-artifact@v4
      with:
        name: dnacalib-python3.13-windows
        path: output
