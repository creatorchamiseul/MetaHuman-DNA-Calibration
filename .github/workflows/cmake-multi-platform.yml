name: Build MetaHuman DNA Calibration for Blender 5.1 (Windows Only)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # GitHub 상에서 수동으로 빌드 버튼을 누를 수 있게 합니다.

jobs:
  build-windows:
    name: Build on Windows (Python 3.13)
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true # 대용량 DNA 파일이 포함되어 있으므로 Git LFS를 활성화합니다.

    - name: Set up Python 3.13 (Blender 5.1 Target)
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel pybind11

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25.x'

    - name: Configure and Build C++ Library
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DPYTHON_EXECUTABLE=python
        cmake --build build --config Release --target all

    - name: Prepare Blender Addon Package
      shell: powershell
      run: |
        # 1. 애드온 최종 빌드 폴더 생성
        New-Item -ItemType Directory -Force -Path "blender_addon/metahuman_dna"
        New-Item -ItemType Directory -Force -Path "blender_addon/metahuman_dna/lib"
        
        # 2. 파이썬 소스코드 및 파일들을 애드온 폴더로 복사
        Copy-Item -Path "dna" -Destination "blender_addon/metahuman_dna/" -Recurse -Force
        Copy-Item -Path "dnacalib" -Destination "blender_addon/metahuman_dna/" -Recurse -Force
        Copy-Item -Path "dna_viewer" -Destination "blender_addon/metahuman_dna/" -Recurse -Force
        
        # 3. 방금 빌드된 Windows용 C++ 파이썬 바이너리(.pyd)를 lib 폴더로 복사
        if (Test-Path "build/lib/Release") {
            Copy-Item -Path "build/lib/Release/*.pyd" -Destination "blender_addon/metahuman_dna/lib/" -Force
        } else {
            Write-Host "Warning: build/lib/Release path not found. Checking fallback paths..."
            Copy-Item -Path "build/lib/*.pyd" -Destination "blender_addon/metahuman_dna/lib/" -ErrorAction SilentlyContinue
        }
        
        # 4. 블렌더가 인식할 수 있는 __init__.py 파일을 동적으로 생성
        $init_content = @"
        bl_info = {
            "name": "MetaHuman DNA Calibration Tools",
            "author": "Epic Games / Custom Build",
            "version": (1, 0, 0),
            "blender": (5, 1, 0),
            "location": "View3D > Sidebar > MetaHuman",
            "description": "MetaHuman DNA Calibration tools inside Blender 5.1",
            "category": "Animation",
        }

        import sys
        import os

        def register():
            lib_path = os.path.join(os.path.dirname(__file__), "lib")
            if lib_path not in sys.path:
                sys.path.insert(0, lib_path)
            print("MetaHuman DNA Calibration Registered successfully for Blender 5.1")

        def unregister():
            print("MetaHuman DNA Calibration Unregistered")
        "@
        
        Set-Content -Path "blender_addon/metahuman_dna/__init__.py" -Value $init_content -Encoding utf8

    - name: Zip Addon Package (Windows Native)
      shell: powershell
      run: |
        # 외부 플러그인 없이 윈도우 내장 명령어로 안전하게 압축합니다.
        Compress-Archive -Path "blender_addon/metahuman_dna" -DestinationPath "metahuman_dna_windows.zip" -Force

    - name: Upload Addon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: metahuman-dna-blender5.1-windows
        path: metahuman_dna_windows.zip
