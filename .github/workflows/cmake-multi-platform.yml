name: Build MetaHuman DNA Calibration for Blender 5.1 (Windows Only)

on:
  workflow_dispatch: # GitHub 상에서 수동으로 빌드 버튼을 누를 수 있게 합니다.

jobs:
  build-windows:
    name: Build on Windows (Python 3.13)
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true # 대용량 DNA 샘플 파일 로드를 위해 내장 LFS 기능을 켭니다.

    - name: Set up Python 3.13 (Blender 5.1 Target)
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Setup MSVC Compiler Env
      uses: ilammy/msvc-dev-cmd@v1 # OpenRigLogic 빌드 성공 핵심 가상 환경 매핑

    - name: Install SWIG via Chocolatey
      shell: pwsh
      run: |
        choco install swig -y
        swig -version
        python --version

    - name: Configure CMake
      shell: pwsh
      run: |
        $pythonDir = Split-Path (Get-Command python).Source
        
        # 실제 CMakeLists.txt가 있는 dnacalib 폴더를 빌드 타겟 소스로 명시합니다.
        cmake -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DPython_EXECUTABLE="$pythonDir\python.exe" `
          -DPython_ROOT_DIR="$pythonDir" `
          dnacalib

    - name: Build C++ Library
      shell: pwsh
      run: |
        cmake --build build --config Release --parallel

    - name: Show generated binary files
      shell: pwsh
      run: |
        Get-ChildItem build -Recurse -Include *.pyd
        Get-ChildItem build -Recurse -Include *.dll
        Get-ChildItem build -Recurse -Include *.lib
        Get-ChildItem build -Recurse -Include *.py

    - name: Prepare Blender Addon Package
      shell: powershell
      run: |
        # 1. 블렌더 전용 애드온 폴더 구조 동적 빌드
        New-Item -ItemType Directory -Force -Path "blender_addon/metahuman_dna"
        New-Item -ItemType Directory -Force -Path "blender_addon/metahuman_dna/lib"
        
        # 2. 리포지토리의 파이썬 기반 소스코드 이동
        Copy-Item -Path "dna" -Destination "blender_addon/metahuman_dna/" -Recurse -Force
        Copy-Item -Path "dnacalib" -Destination "blender_addon/metahuman_dna/" -Recurse -Force
        Copy-Item -Path "dna_viewer" -Destination "blender_addon/metahuman_dna/" -Recurse -Force
        
        # 3. 방금 성공적으로 빌드 완료된 Windows용 *.pyd 및 바이너리들을 애드온 내 lib 폴더로 집약
        Get-ChildItem build -Recurse -Include *.pyd, *.dll, *.lib, *.py | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination "blender_addon/metahuman_dna/lib/" -Force
        }
        
        # 4. 블렌더 5.1 인식 및 라이브러리 경로(sys.path) 추가용 __init__.py 파일 생성
        $init_content = @"
        bl_info = {
            "name": "MetaHuman DNA Calibration Tools",
            "author": "Epic Games / Custom Build",
            "version": (1, 0, 0),
            "blender": (5, 1, 0),
            "location": "View3D > Sidebar > MetaHuman",
            "description": "MetaHuman DNA Calibration tools inside Blender 5.1",
            "category": "Animation",
        }

        import sys
        import os

        def register():
            lib_path = os.path.join(os.path.dirname(__file__), "lib")
            if lib_path not in sys.path:
                sys.path.insert(0, lib_path)
            print("MetaHuman DNA Calibration Registered successfully for Blender 5.1")

        def unregister():
            print("MetaHuman DNA Calibration Unregistered")
        "@
        
        Set-Content -Path "blender_addon/metahuman_dna/__init__.py" -Value $init_content -Encoding utf8

    - name: Zip Addon Package (Windows Native)
      shell: powershell
      run: |
        # 블렌더에서 바로 설치(Install...)할 수 있는 단일 ZIP 압축파일 생성
        Compress-Archive -Path "blender_addon/metahuman_dna" -DestinationPath "metahuman_dna_blender5.1_windows.zip" -Force

    - name: Upload Addon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MetaHuman-DNA-Blender5.1-Addon
        path: metahuman_dna_blender5.1_windows.zip
