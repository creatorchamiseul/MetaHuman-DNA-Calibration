name: Build MetaHuman DNA Calibration for Blender 5.1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 필요할 때 수동으로 빌드를 실행할 수 있는 버튼을 활성화합니다.

jobs:
  build-addon:
    name: Build on ${{ matrix.os }} (Python 3.13)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 크로스 플랫폼 지원 (Windows와 Linux 빌드)
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true # 대용량 DNA 샘플 파일이 있으므로 Git LFS를 활성화합니다.

    - name: Set up Python 3.13 (Blender 5.1 Target)
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel pybind11

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25.x'

    # ----------------------------------------------------
    # 각 OS 환경에 맞는 C++ 컴파일 및 바이너리 빌드 단계
    # ----------------------------------------------------
    - name: Configure and Build (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DPYTHON_EXECUTABLE=python
        cmake --build build --config Release --target all

    - name: Configure and Build (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DPYTHON_EXECUTABLE=python3
        cmake --build build --config Release --target all

    # ----------------------------------------------------
    # 블렌더 5.1 애드온 패키징 구조화 및 압스크립트 배치
    # ----------------------------------------------------
    - name: Prepare Blender Addon Package
      shell: bash
      run: |
        # 애드온으로 묶을 최종 폴더 생성
        mkdir -p blender_addon/metahuman_dna
        
        # 1. 기존 리포지토리의 파이썬 소스코드 복사 (dna, dnacalib, dna_viewer 등)
        cp -r dna blender_addon/metahuman_dna/
        cp -r dnacalib blender_addon/metahuman_dna/
        cp -r dna_viewer blender_addon/metahuman_dna/
        
        # 2. 방금 빌드 완료된 C++ 파이썬 바이너리(.pyd 또는 .so)를 라이브러리 폴더로 이동
        mkdir -p blender_addon/metahuman_dna/lib
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp build/lib/Release/*.pyd blender_addon/metahuman_dna/lib/ || true
        else
          cp build/lib/*.so blender_addon/metahuman_dna/lib/ || true
        fi
        
        # 3. 블렌더 애드온 인식용 __init__.py 파일 동적 생성
        cat << 'EOF' > blender_addon/metahuman_dna/__init__.py
        bl_info = {
            "name": "MetaHuman DNA Calibration Tools",
            "author": "Epic Games / Custom Build",
            "version": (1, 0, 0),
            "blender": (5, 1, 0),
            "location": "View3D > Sidebar > MetaHuman",
            "description": "MetaHuman DNA Calibration tools inside Blender 5.1",
            "category": "Animation",
        }

        import sys
        import os

        def register():
            # 애드온 로드시 내부 바이너리가 담긴 lib 경로를 시스템 패스에 주입합니다.
            lib_path = os.path.join(os.path.dirname(__file__), "lib")
            if lib_path not in sys.path:
                sys.path.insert(0, lib_path)
            print("MetaHuman DNA Calibration Registered successfully for Blender 5.1")

        def unregister():
            print("MetaHuman DNA Calibration Unregistered")
        EOF

    # ----------------------------------------------------
    # 최종 결과물을 Zip으로 압축하여 GitHub에 업로드
    # ----------------------------------------------------
    - name: Create Addon Zip Archive
      uses: theskumar/clean-穩@v1 # 폴더 압축 자동화 지원용
      with:
        files: blender_addon/metahuman_dna
      
    - name: Zip Folder Manual (Fallback)
      shell: bash
      run: |
        cd blender_addon
        zip -r ../metahuman_dna_${{ matrix.os }}.zip metahuman_dna/

    - name: Upload Addon Artifact
      uses: actions/upload-artifact@v4
      with:
        name: metahuman-dna-blender5.1-${{ matrix.os }}
        path: metahuman_dna_${{ matrix.os }}.zip
